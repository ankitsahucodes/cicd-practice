name: Deployment Receipt

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
        - name: Print Details
          run: |
           echo "================================"
           echo "       DEPLOYMENT RECEIPT       "
           echo "================================"
           echo ""
           echo "Repository : ${{ github.event.repository.name }}"
           echo "Branch     : ${{ github.ref_name }}"
           echo "Triggered By : ${{ github.actor }}"
           echo "Event Type : ${{ github.event_name }}"
           echo ""
           echo "Timestamp : $(TZ='Asia/Kolkata' date '+%a %b %d %I:%M:%S %p IST %Y')"
           echo ""
           echo "================================"