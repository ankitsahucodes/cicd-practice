name: Server Health Report

on:
  push:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Print Server Health Report
        run: |
          DISK=$(df -h / | awk 'NR==2 {print $5}')
          MEM=$(free -h | awk '/Mem:/ {print $7}')
          CORES=$(nproc)
          NODE=$(node -v)
          PYTHON=$(python3 --version | awk '{print $2}')

          if [ "${DISK%\%}" -lt 80 ]; then
              STATUS="✅ HEALTHY"
          else
              STATUS="❌ UNHEALTHY"
          fi

          echo "📊 SERVER HEALTH REPORT"
          echo ""
          echo "Disk Usage:"
          echo "$DISK"
          echo ""
          echo "Memory Available:"
          echo "$MEM"
          echo ""
          echo "CPU Cores:"
          echo "$CORES"
          echo ""
          echo "Node Version:"
          echo "$NODE"
          echo ""
          echo "Python Version:"
          echo "$PYTHON"
          echo ""
          echo "Health Status:"
          echo "$STATUS"